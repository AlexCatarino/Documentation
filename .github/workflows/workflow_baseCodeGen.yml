name: Run All Code Generators

on:
  workflow_call:
    inputs:
      # pass in environment through manual trigger, if not passed in, default to 'dev'
      script-name:
        required: true
        type: string
        default: 'API-Reference-Code-Generator'

jobs:
  run:
    runs-on: ubuntu-20.04

    steps:
      - uses: actions/checkout@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.22.3
          pip install pandas==1.4.2

      - name: Run ${{ inputs.script-name }} Python Script
        run: |- 
          python code-generators/${{ inputs.script-name }}.py
          echo "::set-output name=diff::$(git diff | wc -m)"

  commit:
    runs-on: ubuntu-20.04
    needs: [ run ]
    if: needs.run.outputs.diff > 0
    steps:
      - uses: actions/checkout@v2
      - name: Commit
        run: |-
          echo The diff count is ${{needs.run.outputs.diff}}
          git checkout -b ${{ inputs.script-name }}
          git add -A
          git commit -m "Run ${{ inputs.script-name }} Python Script"
          git push